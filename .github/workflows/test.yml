name: test

on:
  push:
    branches:
      - main
      - beta
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  integration:
    name: Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: 'npm'

      - run: npm ci
      - run: npm test

  end-to-end:
    name: End-to-End
    runs-on: ubuntu-latest
    # do not run from forks, as forks don’t have access to repository secrets
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.owner.login == github.event.pull_request.base.repo.owner.login
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - uses: ./ # Uses the action in the root directory
        id: test
        with:
          app-id: ${{ vars.TEST_APP_ID }}
          private-key: ${{ secrets.TEST_APP_PRIVATE_KEY }}
      - uses: octokit/request-action@v2.x
        id: get-repository
        env:
          GITHUB_TOKEN: ${{ steps.test.outputs.token }}
        with:
          route: GET /installation/repositories
      - run: echo '${{ steps.get-repository.outputs.data }}'

  end-to-end-proxy:
    name: End-to-End with proxy
    runs-on: ubuntu-latest
    # do not run from forks, as forks don’t have access to repository secrets
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.owner.login == github.event.pull_request.base.repo.owner.login
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Start local proxy
        env:
          PROXY_LOG_PATH: ${{ runner.temp }}/proxy-events.jsonl
          PROXY_SERVER_LOG_PATH: ${{ runner.temp }}/proxy-server.log
        run: |
          node scripts/test-proxy-server.js "$PROXY_LOG_PATH" 3128 >"$PROXY_SERVER_LOG_PATH" 2>&1 &
          echo $! > "$RUNNER_TEMP/proxy-server.pid"

          for _ in $(seq 1 30); do
            if test -f "$PROXY_SERVER_LOG_PATH" && grep -q "Proxy server listening" "$PROXY_SERVER_LOG_PATH"; then
              break
            fi
            sleep 1
          done

          grep -q "Proxy server listening" "$PROXY_SERVER_LOG_PATH"
      - uses: ./ # Uses the action in the root directory
        env:
          NODE_USE_ENV_PROXY: "1"
          https_proxy: http://127.0.0.1:3128
        with:
          app-id: ${{ vars.TEST_APP_ID }}
          private-key: ${{ secrets.TEST_APP_PRIVATE_KEY }}
      - name: Assert proxy traffic
        env:
          PROXY_LOG_PATH: ${{ runner.temp }}/proxy-events.jsonl
        run: |
          node --input-type=module <<'EOF'
          import { readFileSync } from "node:fs";

          const events = readFileSync(process.env.PROXY_LOG_PATH, "utf8")
            .split("\n")
            .filter(Boolean)
            .map((line) => JSON.parse(line));

          if (
            !events.some(
              (event) =>
                event.event === "connect" && event.target === "api.github.com:443",
            )
          ) {
            console.error("Expected a CONNECT tunnel to api.github.com:443");
            console.error(events);
            process.exit(1);
          }
          EOF
      - if: failure()
        name: Show proxy logs
        run: |
          test -f "$RUNNER_TEMP/proxy-server.log" && cat "$RUNNER_TEMP/proxy-server.log"
          test -f "$RUNNER_TEMP/proxy-events.jsonl" && cat "$RUNNER_TEMP/proxy-events.jsonl"
      - if: always()
        name: Stop local proxy
        run: |
          if test -f "$RUNNER_TEMP/proxy-server.pid"; then
            kill "$(cat "$RUNNER_TEMP/proxy-server.pid")"
          fi
